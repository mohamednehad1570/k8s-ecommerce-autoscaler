# .github/workflows/ci.yml
# Continuous Integration pipeline for k8s-ecommerce-autoscaler.
#
# Triggers on every push to main and on every pull request targeting main.
# Pipeline stages (in order):
#   1. hadolint   — lints the Dockerfile for best practices
#   2. trivy      — scans the built image for CVEs (vulnerabilities)
#   3. build-push — builds the Docker image and pushes to GHCR
#
# Image is tagged with the Git commit SHA for full traceability.
# ArgoCD (Phase 3) will pull from GHCR using this image.
# =============================================================================

# name: displayed in the GitHub Actions UI — identifies this workflow
name: CI Pipeline

# on: defines what events trigger this workflow
on:
  push:
    branches:
      - main          # trigger on every push to the main branch
  pull_request:
    branches:
      - main          # trigger on PRs targeting main (catches issues before merge)

# env: environment variables available to all jobs in this workflow
env:
  # REGISTRY: the container registry we push images to
  # ghcr.io = GitHub Container Registry (free for public repos)
  REGISTRY: ghcr.io
  # IMAGE_NAME: follows GHCR naming convention: registry/owner/repo/service
  # github.repository = "mohamednehad1570/k8s-ecommerce-autoscaler" (auto-populated)
  IMAGE_NAME: ghcr.io/${{ github.repository }}/ml-service

# jobs: the actual work units — each job runs on a fresh GitHub-hosted VM
jobs:

  # ---------------------------------------------------------------------------
  # Job 1: hadolint
  # Lints the Dockerfile against Dockerfile best practices.
  # Fails the pipeline if the Dockerfile violates any rules.
  # This catches issues like: using :latest tags, running as root without explicit intent,
  # missing --no-cache-dir on pip installs, etc.
  # ---------------------------------------------------------------------------
  hadolint:
    # name: shown in the GitHub Actions UI for this job
    name: Lint Dockerfile
    # runs-on: the OS of the GitHub-hosted runner VM that executes this job
    runs-on: ubuntu-latest

    steps:
      # actions/checkout: clones your repository onto the runner VM
      # without this, the runner has no access to your code
      - name: Checkout code
        uses: actions/checkout@v4

      # hadolint/hadolint-action: official Hadolint GitHub Action
      # reads the Dockerfile and outputs any rule violations
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          # dockerfile: path to the Dockerfile to lint, relative to repo root
          dockerfile: ml-service/Dockerfile
          # failure-threshold: only fail on 'error' level — warnings are allowed
          # error = definite bad practice; warning = suggestion
          failure-threshold: error

  # ---------------------------------------------------------------------------
  # Job 2: trivy-scan
  # Builds the Docker image locally on the runner, then scans it for CVEs.
  # Does NOT push the image — only scans it.
  # Fails the pipeline if any CRITICAL severity vulnerabilities are found.
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Scan Image for CVEs
    runs-on: ubuntu-latest
    # needs: this job only starts after hadolint passes
    # no point scanning a Dockerfile that doesn't even lint correctly
    needs: hadolint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the image locally for scanning — not pushed to GHCR yet
      # - `docker build`: builds the image from the Dockerfile
      # - `-t scan-target`: tags it as "scan-target" (temporary local tag for Trivy to reference)
      # - `./ml-service`: the build context (directory containing Dockerfile and source files)
      - name: Build image for scanning
        run: docker build -t scan-target ./ml-service

      # aquasecurity/trivy-action: official Trivy GitHub Action
      # scans the locally built image for known CVEs in OS packages and Python deps
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          # image-ref: the local image tag to scan (built in previous step)
          image-ref: scan-target
          # format: table = human-readable output in the Actions log
          format: table
          # exit-code: 1 = fail the pipeline if vulnerabilities are found
          exit-code: '1'
          # ignore-unfixed: skip CVEs that have no fix available yet
          # Only fail on CVEs where an upgrade path actually exists
          ignore-unfixed: true
          # severity: only fail on CRITICAL vulnerabilities
          # HIGH,MEDIUM,LOW are reported but don't block the pipeline at this stage
          severity: CRITICAL

  # ---------------------------------------------------------------------------
  # Job 3: build-push
  # Builds the final Docker image and pushes it to GHCR.
  # Only runs after both hadolint and trivy-scan pass.
  # Tags the image with both 'latest' and the exact Git commit SHA.
  # The commit SHA tag gives ArgoCD full deployment traceability.
  # ---------------------------------------------------------------------------
  build-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    # needs: only runs if BOTH previous jobs passed
    needs: [hadolint, trivy-scan]
    # permissions: grants this job write access to GHCR for pushing images
    # GitHub Actions uses the GITHUB_TOKEN (auto-generated per run) for auth
    permissions:
      contents: read      # read the repo code
      packages: write     # push images to GHCR (GitHub Packages)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # docker/login-action: authenticates the runner's Docker daemon with GHCR
      # Uses GITHUB_TOKEN — automatically available in every Actions run, no setup needed
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          # registry: the registry to authenticate against
          registry: ${{ env.REGISTRY }}
          # username: the GitHub user or org that owns the registry namespace
          username: ${{ github.actor }}
          # password: GITHUB_TOKEN is auto-generated by GitHub for each workflow run
          # it has exactly the permissions declared in the `permissions` block above
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action: generates image tags and labels automatically
      # Produces two tags: 'latest' and the exact 7-character commit SHA
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      # docker/build-push-action: builds and pushes the image to GHCR
      # Uses BuildKit (faster, better caching than standard docker build)
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          # context: the directory sent to the Docker daemon as the build context
          context: ./ml-service
          # push: true = actually push to GHCR after building
          push: true
          # tags: the full image:tag strings generated by the metadata step
          tags: ${{ steps.meta.outputs.tags }}
          # labels: OCI standard image labels (author, source repo, revision, etc.)
          labels: ${{ steps.meta.outputs.labels }}
