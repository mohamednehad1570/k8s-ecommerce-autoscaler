# ── frontend ScaledObject ─────────────────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: frontend-scaledobject
  namespace: online-boutique
  labels:
    app: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicaCount: 1
  maxReplicaCount: 8
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      metricName: frontend_cpu_usage
      query: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="online-boutique",container="server",pod=~"frontend.*"})
      threshold: "0.05"
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      metricName: predicted_rps
      query: predicted_rps
      threshold: "5"
---
# ── frontend PodDisruptionBudget ──────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: online-boutique
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
# ── cartservice ScaledObject ──────────────────────────────────────────────────
# Uses predicted_rps — same Holt-Winters signal as frontend
# All 3 services pre-scale simultaneously from one forecast
apiVersion: keda.sh/v1alpha1
