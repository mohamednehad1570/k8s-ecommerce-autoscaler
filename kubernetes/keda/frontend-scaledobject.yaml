apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: frontend-scaledobject
  namespace: online-boutique
  labels:
    app: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicaCount: 1               # always keep 1 pod running — baseline availability
  maxReplicaCount: 5               # cap at 5 — matches burst-pool capacity
  cooldownPeriod: 60               # wait 60s before scaling back down after load drops
  pollingInterval: 15              # evaluate both triggers every 15 seconds

  triggers:

  # ── Trigger 1: Reactive (CPU-based) ─────────────────────────────────────────
  # This is the HPA-equivalent baseline — reacts to load that has ALREADY landed.
  # Used as the safety net: if prediction misses, CPU still catches the spike.
  # threshold 0.05: scale up when frontend CPU exceeds 0.05 cores per replica
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      metricName: frontend_cpu_usage
      query: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="online-boutique",container="server",pod=~"frontend.*"})
      threshold: "0.05"

  # ── Trigger 2: Predictive (Holt-Winters forecast) ────────────────────────────
  # Reads predicted_rps from Prometheus (scraped from ml-service /metrics).
  # KEDA scales frontend BEFORE load lands — this is the thesis proof.
  # threshold 20: add 1 replica per 20 predicted RPS
  # e.g. predicted_rps=37 → ceil(37/20)=2 replicas
  #      predicted_rps=80 → ceil(80/20)=4 replicas
  #      predicted_rps=120 → 5 replicas (capped at maxReplicaCount)
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      metricName: predicted_rps
      query: predicted_rps
      threshold: "20"
