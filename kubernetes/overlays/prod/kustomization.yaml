apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base: the original Online Boutique manifests (untouched)
resources:
- ../../base/online-boutique

# Strategic merge patches: add nodeAffinity to all Deployments
# Prefers workload-pool, accepts burst-pool as fallback
# Platform pods on default-pool are NOT affected (separate toleration config)
patchesStrategicMerge:
- node-affinity-patch.yaml
