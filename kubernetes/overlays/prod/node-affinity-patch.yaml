# nodeAffinity patch applied to all Online Boutique Deployments via Kustomize
# preferredDuringSchedulingIgnoredDuringExecution = soft preference
# Weight 100: strongly prefer workload-pool nodes
# Weight 50: accept burst-pool nodes as overflow when workload-pool is full
# default-pool nodes will be tainted with dedicated=platform:NoSchedule
# so application pods cannot land there even without a hard nodeSelector

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: online-boutique
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: cloud.google.com/gke-nodepool
                operator: In
                values:
                - workload-pool
          - weight: 50
            preference:
              matchExpressions:
              - key: cloud.google.com/gke-nodepool
                operator: In
                values:
                - burst-pool
