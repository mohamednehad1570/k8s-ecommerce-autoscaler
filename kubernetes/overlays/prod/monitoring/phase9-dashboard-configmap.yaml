ue": {"fixedColor": "#FF9830", "mode": "fixed"}}]}, {"matcher": {"id": "byName", "options": "ALL 3 total CPU"}, "properties": [{"id": "color", "value": {"fixedColor": "#FF5733", "mode": "fixed"}}, {"id": "custom.lineWidth", "value": 3}, {"id": "custom.lineStyle", "value": {"dash": [8, 4], "fill": "dash"}}]}]}, "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16}, "id": 3, "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"online-boutique\", container=\"frontend\"}[1m]))", "legendFormat": "frontend CPU", "refId": "A"}, {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"online-boutique\", container=\"cartservice\"}[1m]))", "legendFormat": "cartservice CPU", "refId": "B"}, {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"online-boutique\", container=\"productcatalogservice\"}[1m]))", "legendFormat": "productcatalogservice CPU", "refId": "C"}, {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"online-boutique\", container=~\"frontend|cartservice|productcatalogservice\"}[1m]))", "legendFormat": "ALL 3 total CPU", "refId": "D"}], "title": "Panel 3 \u2014 CPU Usage in Cores (per service + combined)", "description": "CPU consumption rate per service plus combined total. In Run 1 (HPA) the combined line spikes sharply because all 3 services are under-replicated while HPA waits for the threshold to be breached. In Run 2 (KEDA) the curve is flatter per pod because load is distributed across pre-scaled replicas.", "type": "timeseries"}, {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 