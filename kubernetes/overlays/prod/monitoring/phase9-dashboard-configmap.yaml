# ─────────────────────────────────────────────────────────────────────────────
# Grafana Dashboard ConfigMap — Phase 9: Predictive vs Reactive Autoscaling
#
# PURPOSE: Git-backed dashboard that survives pod restarts, PVC loss, and
#          Helm reinstalls. ArgoCD deploys this; Grafana sidecar auto-loads it.
#
# HOW IT WORKS:
#   1. Commit this file to: kubernetes/overlays/prod/monitoring/
#   2. ArgoCD detects the change and applies it to the monitoring namespace
#   3. Grafana sidecar (grafana-sc-dashboard container) detects label
#      grafana_dashboard="1" and mounts the JSON as a live dashboard
#   4. Dashboard appears immediately in Grafana UI under tag "phase9"
#   5. On every gke-start + ArgoCD sync, dashboard is guaranteed present
#
# PANELS (7 total — each has 4 queries: per service x3 + combined):
#   1. Desired Replica Count
#   2. Ready Replicas / Scaling Lag Indicator
#   3. CPU Usage in Cores
#   4. Memory Working Set
#   5. Network Transmit Bytes/s
#   6. Spec Replicas / Autoscaler Decision Timeline
#   7. ML Predicted RPS + KEDA Trigger Thresholds
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1       # apiVersion: core Kubernetes API — ConfigMap is a v1 core resource
kind: ConfigMap      # kind: ConfigMap stores non-confidential key-value data
metadata:
  name: phase9-autoscaling-dashboard   # name: unique identifier within the namespace
  namespace: monitoring                 # namespace: must match Grafana's deployment namespace
  labels:
    grafana_dashboard: "1"             # label: Grafana sidecar watches for exactly this label
                                       #        string "1" not boolean — must be quoted
data:
  # filename key must end in .json — sidecar only mounts .json files as dashboards
  phase9-autoscaling.json: |
