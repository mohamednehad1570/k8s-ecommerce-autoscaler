 {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "kube_deployment_status_replicas{namespace=\"online-boutique\", deployment=\"productcatalogservice\"}", "legendFormat": "productcatalogservice", "refId": "C"}, {"datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(kube_deployment_status_replicas{namespace=\"online-boutique\", deployment=~\"frontend|cartservice|productcatalogservice\"})", "legendFormat": "ALL 3 combined", "refId": "D"}], "title": "Panel 1 \u2014 Desired Replica Count (per service + combined)", "description": "Desired replicas for each of the 3 autoscaled services plus their combined total. Run 1 (HPA): replicas climb reactively after CPU threshold is breached. Run 2 (KEDA): replicas pre-scale before Locust ramps up. The combined line shows total pod capacity across all 3 services.", "type": "timeseries"}, {"datasource": {"type": "prometheus", "uid": "prometheus"}, "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2, "fillOpacity": 8}, "unit": "short", "min": 0}, "overrides": [{"matcher": {"id": "byName", "options": "frontend ready"}, "properties": [{"id": "color", "value": {"fixedColor": "#73BF69", "mode": "fixed"}}]}, {"matcher": {"id": "byName", "options": "cartservice ready"}, "properties": [{"id": "color", "value": {"fixedColor": "#F2CC0C", "mode": "fixed"}}]}, {"matcher": {"id": "byName", "options": "productcatalogservice ready"}, "properties": [{"id": "color", "value": {"fixedColor": "#FF9830", "mode": "fixed"}}]}, {"matcher": {"id": "byName", "options": "ALL 3 ready combined"}, "properties": [{"id": "color", "value": {"fixedColor": "#FF5733", "mode": "fixed"}}, {"id": "custom.lineWidth", "value": 3}, {"id": "custom.lineStyle", "value": {"dash": [8, 4], "fill": "dash"}}]}]}, "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8}, "id": 2, "options": {"tooltip": {"mode": "multi"}, "legend": {"displayMode": "list", "placement": "bottom"}}, "targets": [{"datasource": {"type": "pro