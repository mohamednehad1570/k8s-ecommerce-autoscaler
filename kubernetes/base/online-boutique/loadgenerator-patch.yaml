
# Patch: disable the built-in load generator.
# We use Locust (Phase 10) for load testing instead.
# Setting replicas: 0 keeps the Deployment object but runs zero pods.
apiVersion: apps/v1       # apiVersion: the Kubernetes API group for Deployments
kind: Deployment          # kind: the resource type we're patching
metadata:
  name: loadgenerator     # name: must match exactly the Deployment name in release.yaml
spec:
  replicas: 0             # replicas: zero pods = effectively disabled, no resource consumption
